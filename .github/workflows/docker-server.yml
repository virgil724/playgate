# Build and publish the playgate-server image to GHCR on every change.
#
# Watchtower on the deployment box polls ghcr.io/<owner>/playgate-server:latest
# and redeploys automatically — pushing to main IS the deploy.
#
# NOTE: the first push creates the GHCR package as PRIVATE. Flip it to public
# once (GitHub → Packages → playgate-server → Package settings → Change
# visibility) so the server can `docker pull` it anonymously.
name: docker-server

on:
  push:
    branches: [main]
    paths:
      - "playgate-server/**"
      - "docker/server.Dockerfile"
      - ".github/workflows/docker-server.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # arm64 layer is emulated via qemu — Oracle Free's Ampere boxes are arm64.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/server.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/playgate-server:latest
            ghcr.io/${{ github.repository_owner }}/playgate-server:${{ github.sha }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
