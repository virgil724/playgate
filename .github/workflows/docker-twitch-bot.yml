# Build and publish the playgate-twitch-bot image to GHCR on every change.
#
# Watchtower (if enabled on the deployment box) polls
# ghcr.io/<owner>/playgate-twitch-bot:latest and redeploys automatically.
#
# NOTE: the first push creates the GHCR package as PRIVATE. Flip it to public
# once (GitHub → Packages → playgate-twitch-bot → Package settings → Change
# visibility) so the bot can `docker pull` it anonymously.
name: docker-twitch-bot

on:
  push:
    branches: [main]
    paths:
      - "playgate-twitch-bot/**"
      - "docker/twitch-bot.Dockerfile"
      - ".github/workflows/docker-twitch-bot.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # arm64 layer is emulated via qemu — Oracle Free's Ampere boxes are arm64.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/twitch-bot.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/playgate-twitch-bot:latest
            ghcr.io/${{ github.repository_owner }}/playgate-twitch-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
