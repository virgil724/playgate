name = "playgate-signaling"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

# Per-room Durable Object holding transient signaling state (replaces KV).
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomDO"

# SQLite-backed DO classes are REQUIRED for the free plan.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Secrets (set via `wrangler secret put`):
#   TURN_KEY_ID       - Cloudflare Realtime TURN key ID
#   TURN_KEY_API_TOKEN - Cloudflare Realtime TURN API token
#   SESSION_SECRET    - shared HMAC secret for stub session-token validation (optional)
#
# To disable auth entirely, set AUTH_DISABLED = "true" as a plain var:
# [vars]
# AUTH_DISABLED = "true"
