name = "playgate-signaling"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SIGNALING_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_NAMESPACE_ID"

# Secrets (set via `wrangler secret put`):
#   TURN_KEY_ID       - Cloudflare Realtime TURN key ID
#   TURN_KEY_API_TOKEN - Cloudflare Realtime TURN API token
#   SESSION_SECRET    - shared HMAC secret for stub session-token validation (optional)
#
# To disable auth entirely, set AUTH_DISABLED = "true" as a plain var:
# [vars]
# AUTH_DISABLED = "true"
