# PlayGate Host example configuration.
# Copy to config.yaml and adjust for your machine, then run:
#   go run ./cmd/host -config config.yaml

# Video capture source (T2).
capture:
  source: v4l2          # v4l2 (production, Linux) | synthetic (dev test pattern, any OS)
  device: /dev/video0   # V4L2 device node of the capture card (v4l2 only)
  width: 1920           # match a resolution the card advertises for the chosen format
  height: 1080
  fps: 30               # best-effort; the driver clamps to its nearest rate (raw YUYV often caps at 30;
                        # NV12 is half the bandwidth, so many USB cards offer 60fps in NV12)
  format: YUYV          # YUYV | NV12 | MJPEG — must be a format the card lists at this resolution

# H.264 encoder (T3: ffmpeg subprocess; T13: hardware codec selection).
encoder:
  bitrate: 6000000      # bits per second (ABR start bitrate when abr.enabled)
  preset: ultrafast     # x264 preset (libx264 only; favour latency over size)
  keyframe_interval: 60 # GOP size in frames
  ffmpeg_path: ffmpeg   # path to the ffmpeg binary
  # H.264 encoder (T13). Default libx264 (software) keeps the original behaviour.
  #   libx264        software / CPU (default, always available)
  #   h264_v4l2m2m   Raspberry Pi hardware encoder (Linux + v4l2 m2m device)
  #   h264_vaapi     Intel/AMD GPU via VA-API (set vaapi_device below)
  #   h264_nvenc     NVIDIA GPU
  # At startup the host probes `ffmpeg -encoders`; if the chosen codec is missing
  # it logs an error telling you to install a suitable ffmpeg or fall back to
  # libx264 (it never silently downgrades).
  codec: libx264
  vaapi_device: /dev/dri/renderD128   # DRM render node (h264_vaapi only)

# Audio capture (ALSA -> Opus). Sent on its own WebRTC track alongside the video;
# the browser resynchronises A/V from each track's RTP timestamps. Disabled by
# default so video-only setups are unaffected.
audio:
  enabled: false
  device: default            # ALSA device, e.g. "hw:CARD=MS2109,DEV=0" for an HDMI grabber
  sample_rate: 48000         # ALSA capture rate (Opus is always 48 kHz on the wire)
  channels: 2
  bitrate: 128000            # Opus bitrate (bits/sec)
  # ffmpeg_path:             # optional; defaults to encoder.ffmpeg_path

# Adaptive bitrate (T14). When enabled the host samples WebRTC stats (packet
# loss, RTT) and adjusts the encoder bitrate within [min_bitrate, max_bitrate]
# using AIMD: loss above loss_threshold -> multiplicative decrease; a sustained
# clean link -> additive increase. Changes are debounced by cooldown_seconds and
# applied by restarting the ffmpeg subprocess (keyframe gating hides the blip).
# Disabled by default: the encoder runs at the fixed encoder.bitrate.
abr:
  enabled: false
  min_bitrate: 1000000    # floor (bits/sec) — bad network degrades to this, never stalls
  max_bitrate: 8000000    # ceiling (bits/sec)
  loss_threshold: 0.05    # packet-loss fraction (0..1) that triggers a decrease
  sample_interval_ms: 2000 # how often WebRTC stats are sampled
  cooldown_seconds: 10    # minimum time between two bitrate changes

# Pion WebRTC peer connection (T4). Static ICE servers; used as-is when
# signaling.use_turn is false, and as the fallback when TURN fetch fails.
webrtc:
  ice_servers:
    - stun:stun.l.google.com:19302

# Controller input target (T5).
input:
  target: nxbt                    # nxbt (production, Linux) | log (dev, any OS)
  socket_path: /run/nxbt/nxbt.sock
  rate_hz: 120                    # max commands/second forwarded; 0 disables limiting

# Single-controller session gate (T9). Disabled by default: every viewer may
# control directly (dev convenience). Enable in production and provide the
# playgate-server ed25519 public key (GET /api/public-key).
session:
  enabled: false
  public_key_base64: ""           # exactly one of these two
  public_key_file: ""
  idle_timeout_seconds: 60        # kick idle controller; 0 disables

# Signaling Worker connection (T7/T8: playgate-signaling on Cloudflare Workers).
signaling:
  url: http://localhost:8787      # Worker base URL, e.g. https://x.workers.dev
  room_id: default
  token: ""                       # optional bearer token for the Worker
  poll_interval_ms: 500
  use_turn: false                 # fetch TURN credentials from the Worker at startup

# Pipeline latency reporting (capture -> encode -> track, p50/p95 logged).
metrics:
  report_interval_seconds: 5
  # Live per-stage latency snapshot as JSON at GET /metrics on this address.
  # Localhost-only (unauthenticated). Empty string disables it.
  listen_addr: "127.0.0.1:9091"

# playgate-server integration (optional). When url is set the host periodically
# POSTs a heartbeat so the streamer console can show the room online/offline
# status and the current controller's viewer id. The server also uses heartbeat
# responses to deliver Force kick requests: when kick_requested=true the host
# immediately removes the current controller through the session idle-kick path.
# Leave url empty (the default) to disable this feature entirely.
server:
  url: ""                          # e.g. http://localhost:8080 — empty disables heartbeats
  api_key: ""                      # host API key from playgate-server register-host
  heartbeat_interval_seconds: 30   # how often to POST; values <= 0 default to 30
